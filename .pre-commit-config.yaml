repos:
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.4.4
    hooks:
      - id: ruff
        args: [--fix]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.10.0
    hooks:
      - id: mypy
        args: [--config-file=pyproject.toml]
        additional_dependencies:
          - pydantic>=2.6
          - pydantic-settings>=2.2
          - fastapi>=0.110
          - sqlalchemy[asyncio]>=2.0
          - alembic>=1.13
          - asyncpg>=0.29
          - pandas-stubs>=2.0
          - pytest>=8.0
          - pytest-asyncio>=0.23
          - httpx>=0.27
          - types-PyYAML
