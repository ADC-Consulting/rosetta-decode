services:
  postgres:
    build:
      context: ./config/postgres
      dockerfile: Dockerfile
    restart: unless-stopped
    command: postgres -c shared_preload_libraries=pg_cron -c cron.database_name=rosetta
    environment:
      POSTGRES_DB: rosetta
      POSTGRES_USER: rosetta
      POSTGRES_PASSWORD: rosetta
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./config/postgres:/docker-entrypoint-initdb.d:ro
    networks:
      - rosetta-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rosetta -d rosetta"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: .
      dockerfile: src/backend/Dockerfile
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://rosetta:rosetta@postgres:5432/rosetta
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - rosetta-net

  tensorzero:
    image: tensorzero/gateway:latest
    container_name: rosetta-tensorzero
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      TENSORZERO_POSTGRES_URL: postgres://rosetta:rosetta@postgres:5432/rosetta
      TENSORZERO_GATEWAY_BIND_ADDRESS: 0.0.0.0:3000
      AZURE_AI_FOUNDRY_API_KEY: ${AZURE_AI_FOUNDRY_API_KEY:-}
    volumes:
      - ./config:/app/config:ro
    depends_on:
      postgres:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-lc"]
    command:
      - |
        set -euo pipefail
        cp /app/config/tensorzero.toml /tmp/tensorzero.toml
        gateway --config-file /tmp/tensorzero.toml --run-postgres-migrations
        exec gateway --config-file /tmp/tensorzero.toml --log-format json
    networks:
      - rosetta-net

  worker:
    build:
      context: .
      dockerfile: src/worker/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://rosetta:rosetta@postgres:5432/rosetta
    depends_on:
      postgres:
        condition: service_healthy
      tensorzero:
        condition: service_started
    networks:
      - rosetta-net

  frontend:
    build:
      context: ./src/frontend
      dockerfile: Dockerfile
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=${VITE_API_URL:-http://localhost:8000}
    volumes:
      - ./src/frontend:/app
      - /app/node_modules
    networks:
      - rosetta-net

volumes:
  postgres_data:

networks:
  rosetta-net:
    driver: bridge
