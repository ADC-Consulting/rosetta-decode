name: CI

on:
  push:
    branches: [main, "feat/**"]
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.12"
  LLM_MODEL: "anthropic:claude-sonnet-4-6"
  ANTHROPIC_API_KEY: "test"
  CLOUD: "false"
  DATABASE_URL: "postgresql+asyncpg://rosetta:rosetta@localhost:5432/rosetta"

jobs:
  # ── 1. Lint & type check ─────────────────────────────────────────────────
  check:
    name: Lint & type check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Ruff lint
        run: uv run ruff check src tests

      - name: Ruff format check
        run: uv run ruff format --check src tests

      - name: Mypy
        run: uv run mypy src

  # ── 2. Unit & smoke tests (no real Postgres) ──────────────────────────────
  test:
    name: Test suite
    runs-on: ubuntu-latest
    needs: check

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run tests (excluding reconciliation, cloud, integration)
        run: uv run pytest -m "not reconciliation and not cloud and not integration"

  # ── 3. Reconciliation tests (needs real Postgres + Alembic) ──────────────
  reconciliation:
    name: Reconciliation tests
    runs-on: ubuntu-latest
    needs: test

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: rosetta
          POSTGRES_USER: rosetta
          POSTGRES_PASSWORD: rosetta
        ports: ["5432:5432"]
        options: >-
          --health-cmd pg_isready
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - name: Set up Python ${{ env.PYTHON_VERSION }}
        run: uv python install ${{ env.PYTHON_VERSION }}

      - name: Cache uv dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/uv
          key: uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-${{ hashFiles('uv.lock') }}
          restore-keys: |
            uv-${{ runner.os }}-${{ env.PYTHON_VERSION }}-

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Run Alembic migrations
        run: uv run alembic upgrade head

      - name: Run reconciliation tests with coverage gate
        run: uv run pytest -m reconciliation --cov-config=.coveragerc-reconciliation --cov=src/worker/validation --cov-fail-under=80 --override-ini="addopts=-ra -q --tb=short --strict-markers --strict-config"

  # ── 4. Frontend ───────────────────────────────────────────────────────────
  frontend:
    name: Frontend lint & build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: src/frontend/.nvmrc
          cache: "npm"
          cache-dependency-path: src/frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: src/frontend

      - name: Type check
        run: ./node_modules/.bin/tsc --noEmit
        working-directory: src/frontend

      - name: Lint
        run: npm run lint
        working-directory: src/frontend

      - name: Build
        run: npm run build
        working-directory: src/frontend

  # ── 5. Docker build ───────────────────────────────────────────────────────
  docker:
    name: Docker build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build backend image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/backend/Dockerfile
          push: false
          cache-from: type=gha,scope=backend
          cache-to: type=gha,mode=max,scope=backend
      - name: Build worker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: src/worker/Dockerfile
          push: false
          cache-from: type=gha,scope=worker
          cache-to: type=gha,mode=max,scope=worker
      - name: Build frontend image
        uses: docker/build-push-action@v7
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          push: false
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend