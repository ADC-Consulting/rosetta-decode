[gateway]

[models."gpt-5.4"]
routing = ["azure"]

[models."gpt-5.4".providers.azure]
type = "azure"
deployment_id = "gpt-5.4"
endpoint = "https://ash-pls-ai-dev2.cognitiveservices.azure.com/"
api_key_location = "env::AZURE_AI_FOUNDRY_API_KEY"

[models."claude-opus-4-5"]
routing = ["azure"]

[models."claude-opus-4-5".providers.azure]
type = "anthropic"
model_name = "claude-opus-4-5"
api_base = "https://ash-pls-ai-dev2.cognitiveservices.azure.com/anthropic/v1/"
api_key_location = "env::AZURE_AI_FOUNDRY_API_KEY"

[rate_limiting]
enabled = true

[[rate_limiting.rules]]
always = true
model_inferences_per_day = 1000
